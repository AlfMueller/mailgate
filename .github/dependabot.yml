version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    ignore:
      # Public V1 stays on the Django 5.2 LTS line. Patch updates remain enabled.
      - dependency-name: django
        update-types:
          - version-update:semver-major
    groups:
      python-runtime:
        dependency-type: production
      python-development:
        dependency-type: development
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      codeql-action:
        patterns:
          - github/codeql-action/*
