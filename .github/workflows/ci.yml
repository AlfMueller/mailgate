name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
      - name: Install locked development dependencies
        run: python -m pip install --require-hashes --requirement requirements-dev.lock
      - name: Lint and format check
        run: |
          ruff check app worker scripts tests
          ruff format --check app worker scripts tests
      - name: Compile Python sources
        run: python -m compileall -q app worker scripts tests
      - name: Compile translation catalogs
        run: python app/compile_translations.py
      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: mailgate.test_settings
          MAILGATE_DATABASE_ENGINE: sqlite
          MAILGATE_ENVIRONMENT: test
          MAILGATE_SECRET_KEY: test-only-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          PYTHONPATH: app:worker
        run: python app/manage.py test tests --settings=mailgate.test_settings
      - name: Run Django system checks
        env:
          MAILGATE_DATABASE_ENGINE: sqlite
          MAILGATE_ENVIRONMENT: test
          MAILGATE_SECRET_KEY: test-only-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          PYTHONPATH: app:worker
        run: python app/manage.py check --settings=mailgate.test_settings
      - name: Verify migrations are committed
        env:
          MAILGATE_DATABASE_ENGINE: sqlite
          MAILGATE_ENVIRONMENT: test
          MAILGATE_SECRET_KEY: test-only-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          MAILGATE_MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          PYTHONPATH: app:worker
        run: python app/manage.py makemigrations --check --dry-run --settings=mailgate.test_settings

  compose-boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Create synthetic Compose secrets
        run: python scripts/create_local_secrets.py
      - name: Verify secret permissions for non-root containers
        run: |
          test "$(stat -c '%a' .local/secrets)" = 700
          test "$(stat -c '%a' .local/secrets/django_secret_key)" = 444
          test "$(stat -c '%a' .local/secrets/master_keyring)" = 444
          test "$(stat -c '%a' .local/secrets/backup_key)" = 444
      - name: Validate Compose configuration
        run: |
          docker compose config --quiet
          MAILGATE_DOMAIN=mailgate.example.test MAILGATE_IMAP_ALLOWED_HOST=imap.example.test \
            docker compose -f compose.yaml -f compose.production.yaml config --quiet
      - name: Build and start the full stack
        run: |
          docker compose --profile integration up --build --detach --wait \
            test-imap-upstream dkim-resolver web api worker proxy
      - name: Run PostgreSQL boundary integration tests
        run: docker compose --profile integration run --build --rm test-postgres-boundaries
      - name: Verify HTTP process separation
        run: |
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8080/health/ready)" = 200
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8080/api/v1/messages)" = 401
          docker compose exec -T api python - <<'PY'
          import urllib.error
          import urllib.request

          request = urllib.request.Request(
              "http://web:8000/api/v1/messages", headers={"Host": "127.0.0.1"}
          )
          try:
              urllib.request.urlopen(request, timeout=5)
          except urllib.error.HTTPError as error:
              assert error.code == 404, error.code
          else:
              raise AssertionError("Owner web unexpectedly serves the agent API")
          PY
      - name: Verify PostgreSQL role boundaries
        run: |
          result="$(docker compose exec -T db psql -U mailgate_admin -d mailgate -Atc "SELECT has_table_privilege('mailgate_api','gateway_message','SELECT'),has_table_privilege('mailgate_api','mailgate_api_approved_message','SELECT'),has_function_privilege('mailgate_api','mailgate_api_authorize(text,text)','EXECUTE'),has_table_privilege('mailgate_worker','auth_user','SELECT');")"
          test "$result" = "f|t|t|f"
          docker compose exec -T api python -c "import os; assert not any(k in os.environ for k in ('MAILGATE_MASTER_KEY','MAILGATE_MASTER_KEY_FILE','MAILGATE_SETUP_TOKEN','MAILGATE_SETUP_TOKEN_FILE'))"
      - name: Verify worker egress boundaries
        run: |
          docker compose exec -T worker python -c "import socket; s=socket.socket(); s.settimeout(3); assert s.connect_ex(('1.1.1.1', 443)) != 0"
          docker compose exec -T worker python -c "import os; assert os.environ['MAILGATE_DKIM_RESOLVER_URL'] == 'http://dkim-resolver:8053'"
          docker compose exec -T dkim-resolver python -c "import os; assert not any('SECRET' in key or 'PASSWORD' in key or 'MASTER' in key for key in os.environ)"
          docker compose exec -T worker python - <<'PY'
          import socket
          import ssl
          import tempfile

          unverified = ssl._create_unverified_context()
          with unverified.wrap_socket(
              socket.create_connection(("imap-egress", 10993), 5),
              server_hostname="imap.example.test",
          ) as connection:
              certificate = connection.getpeercert(binary_form=True)
          with tempfile.NamedTemporaryFile(mode="w", suffix=".pem") as authority:
              authority.write(ssl.DER_cert_to_PEM_cert(certificate))
              authority.flush()
              verified = ssl.create_default_context(cafile=authority.name)
              with verified.wrap_socket(
                  socket.create_connection(("imap-egress", 10993), 5),
                  server_hostname="imap.example.test",
              ) as connection:
                  assert connection.recv(80).startswith(b"* OK")
          PY
          if docker compose exec -T worker python -c "import socket,ssl; ssl._create_unverified_context().wrap_socket(socket.create_connection(('imap-egress',10993),5),server_hostname='denied.example.test')"; then
            echo "Egress relay accepted a non-allowlisted TLS SNI" >&2
            exit 1
          fi
      - name: Verify production process health checks
        env:
          MAILGATE_DOMAIN: mailgate.example.test
          MAILGATE_IMAP_ALLOWED_HOST: imap.example.test
        run: |
          docker compose -p mailgate-prodcheck -f compose.yaml -f compose.production.yaml \
            up --build --detach --wait web api
      - name: Remove production health-check stack
        if: always()
        env:
          MAILGATE_DOMAIN: mailgate.example.test
          MAILGATE_IMAP_ALLOWED_HOST: imap.example.test
        run: |
          docker compose -p mailgate-prodcheck -f compose.yaml -f compose.production.yaml \
            down --volumes
      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Remove integration stack
        if: always()
        run: docker compose down --volumes

  browser-e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install locked browser-test dependencies
        run: python -m pip install --require-hashes --requirement requirements-dev.lock
      - name: Install pinned Chromium runtime
        run: python -m playwright install --with-deps chromium
      - name: Run disposable synthetic owner journey
        env:
          MAILGATE_RUN_E2E: "1"
          PYTHONPATH: app:worker:.
        run: python -m unittest tests.e2e.test_v1_browser_flow -v
