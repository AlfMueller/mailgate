name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install locked dependencies
        run: python -m pip install --require-hashes --requirement requirements.lock
      - name: Compile Python sources
        run: python -m compileall -q app worker scripts tests
      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: mailgate.test_settings
          MAILGATE_DATABASE_ENGINE: sqlite
          MAILGATE_ENVIRONMENT: test
          MAILGATE_SECRET_KEY: test-only-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          PYTHONPATH: app:worker
        run: python app/manage.py test tests --settings=mailgate.test_settings
      - name: Run Django system checks
        env:
          MAILGATE_DATABASE_ENGINE: sqlite
          MAILGATE_ENVIRONMENT: test
          MAILGATE_SECRET_KEY: test-only-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          PYTHONPATH: app:worker
        run: python app/manage.py check --settings=mailgate.test_settings

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Create synthetic Compose secrets
        run: python scripts/create_local_secrets.py
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build application image
        run: docker compose build web
