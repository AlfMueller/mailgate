name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ci:
    name: Full CI for tag commit
    uses: ./.github/workflows/ci.yml

  security:
    name: Full security gates for tag commit
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: ./.github/workflows/security.yml

  publish:
    name: Build, verify and attest
    needs: [ci, security]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Verify tag commit belongs to main
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import pathlib
          import re
          import os
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          expected = tag.removeprefix("v").replace("-rc.", "rc")
          if version != expected or not re.fullmatch(r"\d+\.\d+\.\d+(?:rc\d+)?", version):
              raise SystemExit(f"Tag {tag} does not match releasable project version {version}")
          PY
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: metadata
        with:
          images: ghcr.io/alfmueller/mailgate
          tags: type=raw,value=candidate-${{ github.run_id }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          sbom: true
          provenance: mode=max
      - name: Scan the exact candidate digest
        run: |
          docker run --rm --volume "$HOME/.docker/config.json:/root/.docker/config.json:ro" \
            aquasec/trivy@sha256:be1190afcb28352bfddc4ddeb71470835d16462af68d310f9f4bca710961a41e \
            image --skip-version-check --scanners vuln,secret --severity HIGH,CRITICAL \
            --ignore-unfixed --exit-code 1 \
            ghcr.io/alfmueller/mailgate@${{ steps.build.outputs.digest }}
      - name: Generate release SBOMs for the exact digest
        run: |
          docker run --rm --volume "$PWD:/output" \
            --volume "$HOME/.docker/config.json:/root/.docker/config.json:ro" \
            aquasec/trivy@sha256:be1190afcb28352bfddc4ddeb71470835d16462af68d310f9f4bca710961a41e \
            image --skip-version-check --format spdx-json --output /output/mailgate.spdx.json \
            ghcr.io/alfmueller/mailgate@${{ steps.build.outputs.digest }}
          docker run --rm --volume "$PWD:/output" \
            --volume "$HOME/.docker/config.json:/root/.docker/config.json:ro" \
            aquasec/trivy@sha256:be1190afcb28352bfddc4ddeb71470835d16462af68d310f9f4bca710961a41e \
            image --skip-version-check --format cyclonedx --output /output/mailgate.cdx.json \
            ghcr.io/alfmueller/mailgate@${{ steps.build.outputs.digest }}
          printf 'MAILGATE_IMAGE=ghcr.io/alfmueller/mailgate@%s\n' \
            '${{ steps.build.outputs.digest }}' > mailgate.release.env
          sha256sum mailgate.spdx.json mailgate.cdx.json mailgate.release.env \
            compose.yaml compose.production.yaml compose.release.yaml > SHA256SUMS
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/alfmueller/mailgate
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Promote the verified digest
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          docker buildx imagetools create \
            --tag "ghcr.io/alfmueller/mailgate:$RELEASE_TAG" \
            ghcr.io/alfmueller/mailgate@${{ steps.build.outputs.digest }}
          if [[ "$RELEASE_TAG" != *-rc.* ]]; then
            docker buildx imagetools create \
              --tag ghcr.io/alfmueller/mailgate:latest \
              ghcr.io/alfmueller/mailgate@${{ steps.build.outputs.digest }}
          fi
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          prerelease=""
          if [[ "$RELEASE_TAG" == *-rc.* ]]; then prerelease="--prerelease"; fi
          gh release create "$RELEASE_TAG" $prerelease --generate-notes \
            mailgate.spdx.json mailgate.cdx.json SHA256SUMS \
            mailgate.release.env \
            compose.yaml compose.production.yaml compose.release.yaml
      - name: Remove an unverified candidate after failure
        if: failure() && steps.build.outputs.digest != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version_ids="$(gh api --paginate \
            '/users/AlfMueller/packages/container/mailgate/versions?per_page=100' \
            --jq '.[] | select(.metadata.container.tags[]? == "candidate-${{ github.run_id }}") | .id')"
          if [[ -n "$version_ids" ]]; then
            while read -r version_id; do
              gh api --method DELETE "/users/AlfMueller/packages/container/mailgate/versions/$version_id"
            done <<< "$version_ids"
          fi
