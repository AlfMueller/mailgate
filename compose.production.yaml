services:
  api:
    environment:
      MAILGATE_ALLOWED_HOSTS: api
      MAILGATE_DATABASE_ENGINE: postgresql
      MAILGATE_DATABASE_HOST: db
      MAILGATE_DATABASE_NAME: ${MAILGATE_DATABASE_NAME:-mailgate}
      MAILGATE_DATABASE_PASSWORD_FILE: /run/secrets/postgres_api_password
      MAILGATE_DATABASE_PORT: "5432"
      MAILGATE_DATABASE_USER: mailgate_api
      MAILGATE_ENVIRONMENT: production
      MAILGATE_SECRET_KEY_FILE: /run/secrets/api_django_secret_key
      DJANGO_SETTINGS_MODULE: mailgate.api_settings
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; r=urllib.request.Request('http://127.0.0.1:8000/health/ready',headers={'Host':'api'}); urllib.request.urlopen(r,timeout=3)"]
  proxy:
    user: "1000:1000"
    environment:
      MAILGATE_DOMAIN: ${MAILGATE_DOMAIN:?Set MAILGATE_DOMAIN}
      XDG_CONFIG_HOME: /config
      XDG_DATA_HOME: /data
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile.production:/etc/caddy/Caddyfile:ro
      - caddy_config:/config
      - caddy_data:/data
  web:
    environment:
      MAILGATE_ALLOWED_HOSTS: ${MAILGATE_DOMAIN:?Set MAILGATE_DOMAIN}
      MAILGATE_CSRF_TRUSTED_ORIGINS: https://${MAILGATE_DOMAIN:?Set MAILGATE_DOMAIN}
      MAILGATE_DATABASE_ENGINE: postgresql
      MAILGATE_DATABASE_HOST: db
      MAILGATE_DATABASE_NAME: ${MAILGATE_DATABASE_NAME:-mailgate}
      MAILGATE_DATABASE_PASSWORD_FILE: /run/secrets/postgres_web_password
      MAILGATE_DATABASE_PORT: "5432"
      MAILGATE_DATABASE_USER: mailgate_web
      MAILGATE_ENVIRONMENT: production
      MAILGATE_HTTPS_ONLY: "true"
      MAILGATE_IMAP_ALLOWED_HOST: ${MAILGATE_IMAP_ALLOWED_HOST:?Set MAILGATE_IMAP_ALLOWED_HOST}
      MAILGATE_IMAP_EGRESS_ENABLED: "true"
      MAILGATE_MASTER_KEY_FILE: /run/secrets/master_key
      MAILGATE_SECRET_KEY_FILE: /run/secrets/django_secret_key
      MAILGATE_SETUP_TOKEN_FILE: /run/secrets/setup_token
      MAILGATE_TRUST_PROXY_HEADERS: "true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; r=urllib.request.Request('http://127.0.0.1:8000/health/ready',headers={'Host':'${MAILGATE_DOMAIN:?Set MAILGATE_DOMAIN}','X-Forwarded-Proto':'https'}); urllib.request.urlopen(r,timeout=3)"]
  install-migrate:
    environment:
      MAILGATE_ALLOWED_HOSTS: ${MAILGATE_DOMAIN:?Set MAILGATE_DOMAIN}
      MAILGATE_CSRF_TRUSTED_ORIGINS: https://${MAILGATE_DOMAIN:?Set MAILGATE_DOMAIN}
      MAILGATE_DATABASE_ENGINE: postgresql
      MAILGATE_DATABASE_HOST: db
      MAILGATE_DATABASE_NAME: ${MAILGATE_DATABASE_NAME:-mailgate}
      MAILGATE_DATABASE_PASSWORD_FILE: /run/secrets/postgres_migrate_password
      MAILGATE_DATABASE_PORT: "5432"
      MAILGATE_DATABASE_USER: mailgate_migrate
      MAILGATE_ENVIRONMENT: production
      MAILGATE_HTTPS_ONLY: "true"
      MAILGATE_IMAP_ALLOWED_HOST: ${MAILGATE_IMAP_ALLOWED_HOST:?Set MAILGATE_IMAP_ALLOWED_HOST}
      MAILGATE_IMAP_EGRESS_ENABLED: "true"
      MAILGATE_MASTER_KEY_FILE: /run/secrets/master_key
      MAILGATE_SECRET_KEY_FILE: /run/secrets/django_secret_key
  worker:
    environment:
      MAILGATE_ALLOWED_HOSTS: ${MAILGATE_DOMAIN:?Set MAILGATE_DOMAIN}
      MAILGATE_CSRF_TRUSTED_ORIGINS: https://${MAILGATE_DOMAIN:?Set MAILGATE_DOMAIN}
      MAILGATE_DATABASE_ENGINE: postgresql
      MAILGATE_DATABASE_HOST: db
      MAILGATE_DATABASE_NAME: ${MAILGATE_DATABASE_NAME:-mailgate}
      MAILGATE_DATABASE_PASSWORD_FILE: /run/secrets/postgres_worker_password
      MAILGATE_DATABASE_PORT: "5432"
      MAILGATE_DATABASE_USER: mailgate_worker
      MAILGATE_ENVIRONMENT: production
      MAILGATE_HTTPS_ONLY: "true"
      MAILGATE_IMAP_ALLOWED_HOST: ${MAILGATE_IMAP_ALLOWED_HOST:?Set MAILGATE_IMAP_ALLOWED_HOST}
      MAILGATE_IMAP_EGRESS_ENABLED: "true"
      MAILGATE_MASTER_KEY_FILE: /run/secrets/master_key
      MAILGATE_SECRET_KEY_FILE: /run/secrets/django_secret_key

volumes:
  caddy_config: {}
  caddy_data: {}
